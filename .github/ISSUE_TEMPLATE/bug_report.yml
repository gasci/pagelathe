name: Bug report
description: Something isn't working as expected.
labels: ["bug", "triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `pagelathe ...`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: pagelathe version
      description: Output of `pagelathe --version`.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS & Node version
      placeholder: "macOS 15 / Node 22.5"
    validations:
      required: true
