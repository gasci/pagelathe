name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Validate registry
        run: pnpm --filter @pagelathe/sections test

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter pagelathe build

      # Astro 6 requires Node >=22, so build the app engine only on the 22 leg.
      - name: Build app engine
        if: matrix.node == 22
        run: pnpm --filter @pagelathe/app-engine build

  # Single, matrix-independent status check to require in branch protection.
  # Passes only if lint, test, and build all succeed, so the required-check name
  # never changes when the Node matrix does.
  check:
    if: always()
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI jobs succeeded
        run: |
          [ "${{ needs.lint.result }}" = "success" ] || exit 1
          [ "${{ needs.test.result }}" = "success" ] || exit 1
          [ "${{ needs.build.result }}" = "success" ] || exit 1
